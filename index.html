<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omniva — Ближайший постамат</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.18);
  --text:#f0ede8;--muted:#888;
  --accent:#e8d5a0;--accent2:#c4a96b;
  --green:#6fcf97;--red:#eb5757;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html{background:var(--bg);color:var(--text);font-family:var(--sans)}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:3rem 1.25rem 4rem;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(200,170,90,.08) 0%,transparent 70%),var(--bg)}
.wrap{width:100%;max-width:640px}
.hdr{margin-bottom:2.5rem;text-align:center}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.logo-icon{width:38px;height:38px;border:1.5px solid var(--accent2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.8}
.logo-text{font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-family:var(--mono)}
h1{font-size:clamp(26px,5vw,36px);font-weight:700;line-height:1.15;margin-bottom:.5rem}
.sub{font-size:14px;color:var(--muted);font-family:var(--mono)}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
.slabel{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem;display:block}
.srow{display:flex;gap:8px}
.srow input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:var(--mono);font-size:14px;padding:0 14px;height:46px;outline:none;transition:border-color .2s}
.srow input::placeholder{color:var(--muted)}
.srow input:focus{border-color:var(--accent2)}
.srow button{background:var(--accent);color:#0f0f0f;border:none;border-radius:9px;
  font-family:var(--sans);font-size:13px;font-weight:700;padding:0 20px;height:46px;
  cursor:pointer;letter-spacing:.04em;transition:background .2s,transform .1s;flex-shrink:0}
.srow button:hover{background:#f0e0b0}
.srow button:active{transform:scale(.97)}
.srow button:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed;transform:none}
.status{font-size:12px;font-family:var(--mono);color:var(--muted);
  padding:.5rem 0;display:flex;align-items:center;gap:8px;min-height:28px}
.status.err{color:var(--red)}
.status.ok{color:var(--green)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.ring{width:12px;height:12px;border:1.5px solid rgba(255,255,255,.15);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.rlabel{font-size:11px;font-family:var(--mono);color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem}
.results{display:flex;flex-direction:column;gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.25rem;display:grid;grid-template-columns:24px 1fr auto;
  gap:0 14px;align-items:start;transition:border-color .18s}
.card:hover{border-color:var(--border-h)}
.card.best{border-color:rgba(200,170,90,.35);
  background:linear-gradient(135deg,rgba(200,170,90,.04) 0%,var(--bg2) 60%)}
.rank{font-family:var(--mono);font-size:12px;color:var(--muted);padding-top:2px}
.rank.gold{color:var(--accent2);font-weight:500}
.cbody{min-width:0}
.cname{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.caddr{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:999px;
  letter-spacing:.05em;font-weight:500;border:1px solid}
.tag-ee{color:#6fa8d4;border-color:rgba(111,168,212,.3);background:rgba(111,168,212,.06)}
.tag-lv{color:#d47e6f;border-color:rgba(212,126,111,.3);background:rgba(212,126,111,.06)}
.tag-lt{color:#7db87d;border-color:rgba(125,184,125,.3);background:rgba(125,184,125,.06)}
.tag-best{color:var(--accent2);border-color:rgba(200,170,90,.3);background:rgba(200,170,90,.06)}
.cright{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.cdist{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text);white-space:nowrap}
.mapbtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);
  color:var(--accent2);text-decoration:none;border:1px solid rgba(200,170,90,.25);
  border-radius:6px;padding:4px 10px;transition:border-color .15s,background .15s;white-space:nowrap}
.mapbtn:hover{border-color:var(--accent2);background:rgba(200,170,90,.06)}
footer{margin-top:3rem;text-align:center;font-size:11px;font-family:var(--mono);color:var(--muted)}
footer s{text-decoration:none;color:rgba(255,255,255,.2)}
@media(max-width:480px){
  .card{grid-template-columns:24px 1fr}
  .cright{display:none}
  .cname{white-space:normal}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      </div>
      <span class="logo-text">Omniva Finder</span>
    </div>
    <h1>Ближайший постамат</h1>
    <p class="sub">Эстония · Латвия · Литва</p>
  </header>

  <div class="scard">
    <label class="slabel" for="ainput">Адрес получателя</label>
    <div class="srow">
      <input type="text" id="ainput" placeholder="Напр. Tartu mnt 84, Tallinn" autocomplete="off" />
      <button id="sbtn" onclick="doSearch()">Найти →</button>
    </div>
    <div class="status" id="st"></div>
  </div>

  <div id="rwrap" style="display:none">
    <p class="rlabel" id="rlabel"></p>
    <div class="results" id="results"></div>
  </div>

  <footer>Данные: omniva.ee/locations.json <s>·</s> Геокодинг: OpenStreetMap Nominatim</footer>
</div>

<script>
// Официальный публичный JSON Omniva. Поля:
// TYPE='0' — постамат | A0_NAME — страна | NAME — название
// X_COORDINATE — долгота (lon) | Y_COORDINATE — широта (lat)
// A5_NAME — улица | A7_NAME — номер дома | A3_NAME — город | A2_NAME — район
const DATA = 'https://www.omniva.ee/locations.json';
let terms = [], loaded = false;

function st(type, msg) {
  const el = document.getElementById('st');
  if (type === 'l') { el.className='status'; el.innerHTML='<div class="ring"></div>'+msg; }
  else if (type === 'e') { el.className='status err'; el.innerHTML='<div class="dot"></div>'+msg; }
  else { el.className='status ok'; el.innerHTML='<div class="dot"></div>'+msg; }
}

async function loadData() {
  if (loaded) return true;
  st('l','Загружаем список постаматов Omniva...');
  try {
    const r = await fetch(DATA);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    terms = data.filter(t =>
      t.TYPE === '0' &&
      t.X_COORDINATE && t.Y_COORDINATE &&
      Math.abs(parseFloat(t.X_COORDINATE)) > 0.01 &&
      Math.abs(parseFloat(t.Y_COORDINATE)) > 0.01 &&
      ['EE','LV','LT'].includes(t.A0_NAME)
    );
    loaded = true;
    return true;
  } catch(e) {
    st('e','Ошибка загрузки. Проверь интернет-соединение. ('+e.message+')');
    return false;
  }
}

function hav(lat1, lon1, lat2, lon2) {
  const R=6371000, r=Math.PI/180;
  const a=Math.sin((lat2-lat1)*r/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin((lon2-lon1)*r/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtD(m) {
  return m < 1000 ? Math.round(m)+' м' : (m/1000).toFixed(1)+' км';
}

async function geocode(addr) {
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=ee,lv,lt&q='+encodeURIComponent(addr);
  const r = await fetch(url, {headers:{'Accept-Language':'ru,en','User-Agent':'OmnivaFinder/1.0'}});
  const d = await r.json();
  if (!d.length) return null;
  return {lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon), name:d[0].display_name};
}

function mkCard(t, i) {
  const lat = parseFloat(t.Y_COORDINATE), lon = parseFloat(t.X_COORDINATE);
  const murl = 'https://www.google.com/maps?q='+lat+','+lon;
  const parts = [t.A5_NAME, t.A7_NAME, t.A3_NAME||t.A2_NAME].filter(x=>x&&x.trim());
  const addr = parts.join(' ').trim() || t.A2_NAME || '';
  const ctry = (t.A0_NAME||'EE').toLowerCase();
  const best = i === 0;
  return '<div class="card'+(best?' best':'')+'">'+
    '<div class="rank'+(best?' gold':'')+'">'+( i+1)+'</div>'+
    '<div class="cbody">'+
      '<div class="cname">'+(t.NAME||'Постамат Omniva')+'</div>'+
      '<div class="caddr">'+addr+'</div>'+
      '<div class="ctags">'+
        '<span class="tag tag-'+ctry+'">'+(t.A0_NAME||'EE')+'</span>'+
        (best?'<span class="tag tag-best">★ ближайший</span>':'')+
      '</div>'+
    '</div>'+
    '<div class="cright">'+
      '<div class="cdist">'+fmtD(t._d)+'</div>'+
      '<a class="mapbtn" href="'+murl+'" target="_blank" rel="noopener">📍 Карта</a>'+
    '</div></div>';
}

async function doSearch() {
  const addr = document.getElementById('ainput').value.trim();
  if (!addr) return;
  const btn = document.getElementById('sbtn');
  btn.disabled = true;
  document.getElementById('rwrap').style.display = 'none';

  if (!await loadData()) { btn.disabled = false; return; }

  st('l','Определяем координаты адреса...');
  let g;
  try { g = await geocode(addr); }
  catch(e) { st('e','Ошибка геокодинга: '+e.message); btn.disabled=false; return; }
  if (!g) { st('e','Адрес не найден. Попробуй уточнить — добавь город или страну.'); btn.disabled=false; return; }

  const res = terms
    .map(t => ({...t, _d: hav(g.lat, g.lon, parseFloat(t.Y_COORDINATE), parseFloat(t.X_COORDINATE))}))
    .sort((a,b) => a._d - b._d)
    .slice(0, 10);

  st('ok', g.name.split(',').slice(0,3).join(', '));
  document.getElementById('rlabel').textContent = '10 ближайших постаматов';
  document.getElementById('results').innerHTML = res.map(mkCard).join('');
  document.getElementById('rwrap').style.display = 'block';
  btn.disabled = false;
}

document.getElementById('ainput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Предзагрузка при открытии страницы
loadData().catch(() => {});
</script>
</body>
</html>
